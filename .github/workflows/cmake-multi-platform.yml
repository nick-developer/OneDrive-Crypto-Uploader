name: CMake Multi-Platform (Qt)

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.os }} / ${{ matrix.build_type }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        build_type: [Release]

    env:
      QT_VERSION: "6.8.3"
      BUILD_DIR: build/${{ matrix.os }}-${{ matrix.build_type }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # --------------------
      # Install build tools
      # --------------------
      - name: Install prerequisites (Ubuntu)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libssl-dev

      - name: Install prerequisites (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          brew update
          brew install ninja openssl@3

      - name: Install prerequisites (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install ninja -y
          ninja --version

      # --------------------
      # Windows: setup MSVC environment for Ninja builds
      # --------------------
      - name: Setup MSVC Dev Cmd (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      # --------------------
      # Windows: install OpenSSL via vcpkg (and ensure toolchain path exists)
      # vcpkg-action clones vcpkg into ${{ github.workspace }}\vcpkg. 【4-928df3】
      # --------------------
      - name: Install OpenSSL (Windows via vcpkg)
        if: runner.os == 'Windows'
        uses: johnwason/vcpkg-action@v7
        with:
          pkgs: "openssl"
          triplet: "x64-windows-release"
          token: ${{ github.token }}

      - name: Verify vcpkg toolchain file (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $toolchain = "${{ github.workspace }}\\vcpkg\\scripts\\buildsystems\\vcpkg.cmake"
          if (!(Test-Path $toolchain)) {
            Write-Error "Missing vcpkg toolchain file at: $toolchain"
            exit 1
          }
          Write-Host "Found vcpkg toolchain: $toolchain"

      # --------------------
